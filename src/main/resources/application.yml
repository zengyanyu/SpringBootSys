spring:
  profiles:
    # 打包时，需要激活的配置  默认：dev,test
    active: dev
  # ================ 配置通用的属性-开始 ================
  application:
    name: SpringBootSys V2.7.6
  web:
    resources:
      # 静态资源路径
      static-locations: classpath:/static/,file:D:/upload/
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  servlet:
    multipart:
      max-request-size: 10MB
      max-file-size: 10MB
  main:
    banner-mode: off
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# Mybatis配置
mybatis:
  mapper-locations: classpath:mapper/*.xml #指定Mybatis的Mapper文件
  type-aliases-package: com.zengyanyu.*.entity  #指定Mybatis的实体目录

  configuration:
    # 强制指定使用SLF4J（logback基于SLF4J）输出日志，不使用其他日志框架
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
# 如果你用的是MyBatis-Plus，添加以下配置（二选一即可）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

#mybatis-plus:
#  configuration:
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  #打印SQL语句
#    map-underscore-to-camel-case: true #开启驼峰命名
#    cache-enabled: true  # 开启MyBatis二级缓存
#  global-config:
#    banner: off #关闭mybatisplus启动图标

# ================ 配置通用的属性-结束 ================


# ==================== Excel导入配置 ====================
excel:
  import:
    # 定时任务cron表达式：每10秒执行一次
    cron: "0/5 * * * * ?"
    # 根扫描目录
    scan-path: E:/excel
    is-started: false
    # 文件夹名称 -> 对应Service的Bean名称 映射
    folder-service-map:
      data-dict: dictService    # user-data文件夹 → 用户数据导入服务
      product-data: productImportExcelService # 新增业务直接加配置
    # 默认服务（未匹配到文件夹时使用）
    default-service: defaultImportExcelService

# ==================== 线程池配置 ====================
executor:
  core-size: 5
  max-size: 10
  queue-capacity: 20
  keep-alive-seconds: 60